<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道始流 · 交流社区</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
            color: #1e293b;
        }
        h1 {
            text-align: center;
            font-weight: 350;
            margin-bottom: 30px;
        }
        .intro {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
        }
        .section-title {
            margin-top: 40px;
            font-size: 1.3rem;
            font-weight: 500;
            color: #0f172a;
        }
        .section-desc {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        hr {
            margin: 50px 0;
            border: none;
            border-top: 2px dashed #e2e8f0;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #94a3b8;
            font-size: 0.9rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        /* 返回按钮样式 */
        .back-btn {
            background: none;
            border: none;
            color: #2563eb;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>
    <!-- 返回按钮（仅图标，位于顶部） -->
    <button class="back-btn" onclick="history.back()">
        <
    </button>

    <h1>道始流 · 交流社区</h1>
    
    <div class="intro">
        <p>欢迎来这里交流思想、碰撞火花。</p>
        <p>所有留言永久留存，成为道生态发展史的一部分。</p>
    </div>

    <!-- ========== Giscus 评论区（需要 GitHub 账号） ========== -->
    <div class="section-title">💬 GitHub 用户讨论区</div>
    <div class="section-desc">使用 GitHub 账号登录后可参与讨论。</div>
    
    <script src="https://giscus.app/client.js"
        data-repo="daozhongdao/daoshiliu-forum"
        data-repo-id="R_kgDORjVGqw"
        data-category="Announcements"
        data-category-id="DIC_kwDORjVGq84C4FvI"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="1"
        data-input-position="top"
        data-theme="preferred_color_scheme"
        data-lang="zh-CN"
        data-loading="lazy"
        crossorigin="anonymous"
        async>
    </script>

    <!-- 分割线 -->
    <hr>

    <!-- ========== Twikoo 评论区（游客直接留言） ========== -->
    <div class="section-title">💬 游客留言区</div>
    <div class="section-desc">无需账号，直接留言。</div>

    <div id="twikoo"></div>
    <script src="https://cdn.jsdelivr.net/npm/twikoo@1.6.44/dist/twikoo.all.min.js"></script>
    <script>
        twikoo.init({
            envId: 'daoshiliu-6ggdemuo0b4ebbe0',  // 你的腾讯云环境 ID
            el: '#twikoo'
        });
    </script>

    <div class="footer">
        <p>陈有进 · 道始流 · 开放交流 共探新路 · 可联系微信：liuyanyanfu</p>
    </div>
</body>
</html>
