<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>始·生·逆·流 思考引导</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        h1 { font-weight: 400; }
        .step { margin: 20px 0; }
        label { font-weight: bold; }
        textarea { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 20px; padding: 10px 20px; font-size: 1em; }
    </style>
</head>
<body>
    <h1>始·生·逆·流 思考引导</h1>
    <p>输入你想分析的事物，按四步填空：</p>
    <input type="text" id="subject" placeholder="例如：我的婚姻、股市波动、创业项目" style="width:100%; padding:8px;">
    <div class="step">
        <label>始（条件）：</label><br>
        <textarea id="start" rows="2" placeholder="这件事发生需要具备哪些前提？"></textarea>
    </div>
    <div class="step">
        <label>生（发展）：</label><br>
        <textarea id="develop" rows="2" placeholder="它通常会怎样发展、变化？"></textarea>
    </div>
    <div class="step">
        <label>逆（阻碍）：</label><br>
        <textarea id="obstacle" rows="2" placeholder="可能遇到什么困难或挑战？"></textarea>
    </div>
    <div class="step">
        <label>流（转化）：</label><br>
        <textarea id="flow" rows="2" placeholder="最终可能走向哪里？"></textarea>
    </div>
    <button onclick="generate()">生成结果</button>
    <pre id="output" style="background:#f5f5f5; padding:10px; margin-top:20px;"></pre>
    <script>
        function generate() {
            const subject = document.getElementById('subject').value || '你思考的事物';
            const start = document.getElementById('start').value || '（未填）';
            const develop = document.getElementById('develop').value || '（未填）';
            const obstacle = document.getElementById('obstacle').value || '（未填）';
            const flow = document.getElementById('flow').value || '（未填）';
            const result = `【${subject}】\n始：${start}\n生：${develop}\n逆：${obstacle}\n流：${flow}`;
            document.getElementById('output').innerText = result;
        }
    </script>
</body>
</html>
